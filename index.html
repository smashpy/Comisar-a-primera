<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comisaría 1ª" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230f0f14' width='180' height='180'/><text x='90' y='110' font-size='100' text-anchor='middle' dominant-baseline='middle'>🚔</text></svg>" />
  <title>Comisaría 1ª Sección</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #0f0f14; color: #fff; overflow: hidden; }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(52,199,89,0), 0 0 0 16px rgba(52,199,89,0.22), 0 0 0 32px rgba(52,199,89,0.08); } 100% { box-shadow: 0 0 0 0 rgba(52,199,89,0), 0 0 0 16px rgba(52,199,89,0.22), 0 0 0 32px rgba(52,199,89,0.08); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    
    .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .config-screen { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); justify-content: space-between; padding: 60px 24px 40px; align-items: center; overflow-y: auto; }
    .idle-screen { background: radial-gradient(ellipse at 50% 20%, #182848 0%, #090c13 70%); justify-content: center; align-items: center; gap: 36px; padding: 40px 24px; }
    .call-screen { background: linear-gradient(170deg, #1c1c24 0%, #2a2a32 100%); justify-content: space-between; padding: 60px 24px 40px; align-items: center; }
    .ended-screen { background: #111; justify-content: center; align-items: center; gap: 12px; }
    
    .title { color: #fff; font-size: 26px; font-weight: 300; margin: 0; letter-spacing: 0.5px; }
    .subtitle { color: #4a90e2; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
    
    .config-container { width: 100%; max-width: 340px; }
    .config-title { text-align: center; margin-bottom: 28px; }
    .config-emoji { font-size: 60px; margin-bottom: 12px; }
    
    .option-group { margin-bottom: 24px; }
    .option-label { font-size: 13px; color: #aaa; margin-bottom: 10px; letter-spacing: 0.5px; font-weight: 500; }
    
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
    .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }
    .checkbox-item label { cursor: pointer; flex: 1; }
    
    .call-button { display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
    .button-circle { width: 68px; height: 68px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform 0.1s; }
    .call-button:active .button-circle { transform: scale(0.92); }
    .button-circle.green { background: #34c759; }
    .button-circle.red { background: #ff3b30; }
    .button-label { color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 0.3px; }
    
    .avatar { width: 132px; height: 132px; border-radius: 50%; background: linear-gradient(135deg, #1b3a6b 0%, #2660a8 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; box-shadow: 0 6px 32px rgba(0,0,0,0.5); transition: box-shadow 0.4s ease; }
    .avatar.speaking { animation: pulse-ring 1.5s infinite; }
    .avatar.angry { animation: shake 0.3s ease-in-out; }
    
    #startBtn { gap: 12px; padding: 18px 52px; background: #ff3b30; color: #fff; border: none; border-radius: 50px; font-size: 20px; font-weight: 600; box-shadow: 0 8px 32px rgba(255, 59, 48, 0.4); letter-spacing: 0.3px; font-family: inherit; cursor: pointer; }
    
    .reset-button { margin-top: 40px; color: #4a90e2; background: none; border: none; font-size: 14px; cursor: pointer; text-decoration: underline; font-family: inherit; }
    
    .config-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px; }
    .config-btn { padding: 14px 20px; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .config-btn.confirm { background: #ff3b30; color: #fff; }
    .config-btn.cancel { background: rgba(255,255,255,0.1); color: #fff; }
  </style>
</head>
<body>
  <div id="app" class="screen config-screen">
    <div class="config-container">
      <div class="config-title">
        <div class="config-emoji">🚔</div>
        <h1 class="title">Comisaría 1ª Sección</h1>
        <p class="subtitle">Personalizar intervención</p>
      </div>
      
      <div class="option-group">
        <div class="option-label">Comportamiento del niño</div>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="cabezudo" value="cabezudo">
            <label for="cabezudo">Muy cabezudo</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="desobediente" value="desobediente">
            <label for="desobediente">Desobediente</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="nodormir" value="nodormir">
            <label for="nodormir">No quiere dormir</label>
          </div>
        </div>
      </div>

      <div class="option-group">
        <div class="option-label">Intensidad</div>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="radio" name="intensity" id="medio" value="medio" checked>
            <label for="medio">Medio (amable pero firme)</label>
          </div>
          <div class="checkbox-item">
            <input type="radio" name="intensity" id="fuerte" value="fuerte">
            <label for="fuerte">Fuerte (más intimidante)</label>
          </div>
          <div class="checkbox-item">
            <input type="radio" name="intensity" id="muy-fuerte" value="muy-fuerte">
            <label for="muy-fuerte">Muy fuerte (muy serio)</label>
          </div>
        </div>
      </div>

      <div class="config-btn-group">
        <button class="config-btn cancel" onclick="resetConfig()">Cancelar</button>
        <button class="config-btn confirm" onclick="startCall()">Llamar 📞</button>
      </div>
    </div>
  </div>

  <script>
    const BEHAVIORS = {
      cabezudo: {
        intro: "¡BUENAS NOCHES! Habla el oficial Rodríguez de la Comisaría Primera. Me reportaron que un niño llamado Mauricio anda MUY cabezudo, que no quiere escuchar a sus papás. ¿ES VERDAD ESO?",
        pregunta_medio: "MAURICIO. Te habla el oficial Rodríguez. Mirá bien lo que te digo. Andar de cabezudo es un problema SERIO. Los papás mandan en esa casa, ¿entendés? Y si no cambias YA, voy a ir personalmente a buscarte.",
        pregunta_fuerte: "MAURICIO. ESCÚCHAME BIEN. El oficial Rodríguez acá. Me dicen que andas muy cabezudo, que no obedecés. ESO NO PUEDE SER. Tengo LA PATRULLA LISTA afuera y me voy directo a tu casa si seguís así.",
        pregunta_muy_fuerte: "¡¡MAURICIO!! ACÁ EL OFICIAL RODRÍGUEZ. ¡No me importa lo cabezudo que seas! VAS A ESCUCHAR AHORA O VENGO PERSONALMENTE. Tus papás MANDAN en esa casa, NO VOS. ¡Y si no cambias, TE LLEVO DETENIDO!",
      },
      desobediente: {
        intro: "¡BUENAS NOCHES! Soy el oficial Rodríguez de la Comisaría Primera. Me reportaron que un niño llamado Mauricio es MUY desobediente, que NO obedece a sus papás. ¿ES CIERTO ESO?",
        pregunta_medio: "MAURICIO. Te habla el oficial Rodríguez. La desobediencia es un DELITO grave, hijo. Tus papás se desviven por vos, se matan trabajando, ¡¡Y VOS NO LES OBEDECÉS!! Eso va a cambiar YA o vamos a hablar en la comisaría.",
        pregunta_fuerte: "MAURICIO. ÓYEME BIEN. El oficial Rodríguez. Ser desobediente ES UN DELITO. Tengo el archivo LLeno de casos de niños desobedientes que terminaron mal. MUY MAL. Voy a ir a tu casa ahora mismo y vamos a hablar en SERIO.",
        pregunta_muy_fuerte: "¡¡MAURICIO!! ¡¡ACÁ EL OFICIAL RODRÍGUEZ!! ESTO NO ES UNA ADVERTENCIA, ¡¡ES UNA ORDEN!! VAS A OBEDECER A TUS PAPÁS AHORA MISMO O TE LLEVO DETENIDO A LA COMISARÍA. ¿ENTENDISTE?",
      },
      nodormir: {
        intro: "¡BUENAS NOCHES! Habla el oficial Rodríguez de la Comisaría Primera. Recibimos un reporte de que un niño llamado Mauricio ANDA SIN DORMIR. ¿ES CIERTO ESO?",
        pregunta_medio: "MAURICIO. Te habla el oficial Rodríguez. Esto no es un juego, hijo. No dormir es PELIGROSO. Tengo casos en mi archivo de niños que no durmieron y después tuvieron GRANDES PROBLEMAS. Vos vas a DORMIR AHORA o voy a buscarte.",
        pregunta_fuerte: "MAURICIO. ESCÚCHAME. El oficial Rodríguez. No dormir es un DELITO GRAVE en esta comisaría. He visto niños que no durmieron y terminaron MAL. Muy mal. Voy a ir a tu casa y te voy a ver durmiendo, ¿ENTENDÉS?",
        pregunta_muy_fuerte: "¡¡MAURICIO!! ¡¡ACÁ EL OFICIAL RODRÍGUEZ!! NO ME INTERESA SI TIENES SUEÑO O NO. ¡¡VAS A LA CAMA AHORA MISMO!! Si me entero que andas despierto, VOY A TU CASA Y TE LLEVO DETENIDO. ¿QUEDA CLARO?",
      }
    };

    const RESPUESTAS = {
      medio: {
        patrullero: "Acá el oficial Rodríguez para Central... confirmen disponibilidad de unidad para visita domiciliaria. Sí, el niño Mauricio. Va a ser una conversación seria. Estamos saliendo en cinco minutos.",
        bueno: "Muy bien, Mauricio. Me alegra mucho escuchar eso. Eres un niño responsable. Voy a cancelar el patrullero y anotar que el caso se resolvió. Portate siempre así, ¿eh? Cuídate.",
      },
      fuerte: {
        patrullero: "Acá el oficial Rodríguez para Central. Necesito una unidad YA para domicilio de Mauricio. Va a ser una intervención severa. El patrullero sale AHORA.",
        bueno: "Bien, Mauricio. Así se hace. Pero que no me enteres de que volvés a portarte mal, porque la próxima sí voy en persona. Portate bien de ahora en adelante.",
      },
      "muy-fuerte": {
        patrullero: "Acá el oficial Rodríguez para Central. TENEMOS UN CASO GRAVE. Unidad de intervención de emergencia a casa de Mauricio. ES URGENTE. Vamos YA.",
        bueno: "MAURICIO. La próxima no va a haber advertencia. La próxima voy directamente a tu casa y te llevo detenido. ¿ENTENDISTE? Portate bien. AHORA.",
      }
    };

    let selectedBehaviors = [];
    let selectedIntensity = "medio";
    let phase = "idle";
    let secs = 0;
    let speaking = false;
    let timerInterval = null;
    let ringInterval = null;
    let audioCtx = null;

    function getSelectedBehaviors() {
      return Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
    }

    function getIntensity() {
      return document.querySelector('input[name="intensity"]:checked').value;
    }

    function formatTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function playRing() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const beep = (t, dur, freq) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sine";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.35, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
          osc.start(t);
          osc.stop(t + dur + 0.01);
        };
        const doRing = () => {
          const now = audioCtx.currentTime;
          beep(now, 0.38, 490);
          beep(now + 0.48, 0.38, 490);
        };
        doRing();
        ringInterval = setInterval(doRing, 3200);
      } catch (_) {}
    }

    function stopRing() {
      clearInterval(ringInterval);
      try { audioCtx?.close(); } catch (_) {}
    }

    function speak(text, onEnd) {
      const synth = window.speechSynthesis;
      synth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = "es-ES";
      utt.pitch = selectedIntensity === "muy-fuerte" ? 0.40 : selectedIntensity === "fuerte" ? 0.48 : 0.52;
      utt.rate = selectedIntensity === "muy-fuerte" ? 0.70 : selectedIntensity === "fuerte" ? 0.80 : 0.87;
      utt.volume = 1;
      const voices = synth.getVoices();
      const male = voices.find(v => v.lang.startsWith("es") && /male|jorge|diego|miguel|pablo/i.test(v.name));
      if (male) utt.voice = male;
      else {
        const anySpanish = voices.find(v => v.lang.startsWith("es"));
        if (anySpanish) utt.voice = anySpanish;
      }
      utt.onstart = () => { speaking = true; updateAvatar(); };
      utt.onend = () => { speaking = false; updateAvatar(); onEnd?.(); };
      utt.onerror = () => { speaking = false; updateAvatar(); };
      synth.speak(utt);
    }

    function updateAvatar() {
      const avatar = document.querySelector(".avatar");
      if (avatar) {
        if (selectedIntensity === "muy-fuerte") {
          avatar.classList.add("angry");
          setTimeout(() => avatar.classList.remove("angry"), 300);
        }
        if (speaking) avatar.classList.add("speaking");
        else avatar.classList.remove("speaking");
      }
    }

    function getIntroLine() {
      selectedBehaviors = getSelectedBehaviors();
      if (selectedBehaviors.length === 0) {
        return "Buenas noches, acá habla el oficial Rodríguez de la Comisaría Primera. Me reportaron que un niño llamado Mauricio no está portándose bien. ¿Confirma los datos?";
      }
      const behavior = selectedBehaviors[0];
      return BEHAVIORS[behavior]?.intro || BEHAVIORS.cabezudo.intro;
    }

    function getPreguntaLine() {
      const behavior = selectedBehaviors[0] || "cabezudo";
      const intensity = `pregunta_${selectedIntensity}`;
      return BEHAVIORS[behavior]?.[intensity] || BEHAVIORS.cabezudo[intensity];
    }

    function renderCall() {
      const isActive = phase === "active";
      const html = `
        <div style="text-align: center;">
          <p style="color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; margin: 0;">${isActive ? "En llamada" : "Llamando..."}</p>
          <h2 style="color: #fff; font-size: 34px; font-weight: 300; margin: 6px 0 4px;">Comisaría 1ª</h2>
          <p style="color: #888; font-size: 14px; margin: 0; min-height: 20px;">${isActive ? formatTime(secs) : "Conectando…"}</p>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 14px;">
          <div class="avatar">👮</div>
          ${speaking ? '<div style="display: flex; align-items: center; gap: 7px; color: #34c759; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;"><span style="display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #34c759; animation: blink 1.1s ease-in-out infinite;"></span>Oficial hablando</div>' : '<div style="height: 20px;"></div>'}
        </div>
        <div style="width: 100%; max-width: 300px;">
          ${isActive ? `
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px 16px; margin-bottom: 36px;">
              <button class="call-button" onclick="triggerLine('pregunta')"><div class="button-circle">🎙️</div><span class="button-label">Silencio</span></button>
              <button class="call-button" onclick="triggerLine('patrullero')"><div class="button-circle">⌨️</div><span class="button-label">Patrullero</span></button>
              <button class="call-button" onclick="triggerLine('bueno')"><div class="button-circle">✅</div><span class="button-label">Bien</span></button>
            </div>
            <div style="display: flex; justify-content: center;">
              <button class="call-button" onclick="hangUp()"><div class="button-circle red">📵</div></button>
            </div>
          ` : `
            <div style="display: flex; justify-content: center;">
              <button class="call-button" onclick="hangUp()"><div class="button-circle red">📵</div><span class="button-label">Rechazar</span></button>
            </div>
          `}
        </div>
      `;
      document.getElementById("app").innerHTML = html;
      document.getElementById("app").classList.remove("config-screen", "ended-screen");
      document.getElementById("app").classList.add("call-screen");
    }

    function renderEnded() {
      document.getElementById("app").innerHTML = `
        <div style="text-align: center;">
          <div style="font-size: 64px; margin-bottom: 12px;">📵</div>
          <p style="color: #fff; font-size: 24px; font-weight: 300; margin: 0;">Llamada finalizada</p>
          <p style="color: #666; font-size: 14px; margin: 12px 0 0 0;">${formatTime(secs)}</p>
          <button class="reset-button" onclick="resetConfig()">Volver a configurar</button>
        </div>
      `;
      document.getElementById("app").classList.remove("config-screen", "call-screen");
      document.getElementById("app").classList.add("ended-screen");
    }

    function startCall() {
      selectedBehaviors = getSelectedBehaviors();
      selectedIntensity = getIntensity();

      const unlock = new SpeechSynthesisUtterance(" ");
      unlock.volume = 0;
      window.speechSynthesis.speak(unlock);
      
      phase = "ringing";
      renderCall();
      playRing();
      setTimeout(() => {
        stopRing();
        phase = "active";
        renderCall();
        timerInterval = setInterval(() => {
          secs++;
        }, 1000);
        setTimeout(() => speak(getIntroLine()), 800);
      }, 4200);
    }

    function triggerLine(key) {
      if (key === "pregunta") {
        speak(getPreguntaLine());
      } else if (key === "patrullero") {
        speak(RESPUESTAS[selectedIntensity].patrullero);
      } else if (key === "bueno") {
        speak(RESPUESTAS[selectedIntensity].bueno, () => {
          setTimeout(() => {
            clearInterval(timerInterval);
            phase = "ended";
            renderEnded();
          }, 600);
        });
      }
    }

    function hangUp() {
      window.speechSynthesis.cancel();
      stopRing();
      clearInterval(timerInterval);
      speaking = false;
      phase = "ended";
      renderEnded();
    }

    function resetConfig() {
      phase = "idle";
      secs = 0;
      speaking = false;
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById("medio").checked = true;
      document.getElementById("app").innerHTML = `
        <div class="config-container">
          <div class="config-title">
            <div class="config-emoji">🚔</div>
            <h1 class="title">Comisaría 1ª Sección</h1>
            <p class="subtitle">Personalizar intervención</p>
          </div>
          
          <div class="option-group">
            <div class="option-label">Comportamiento del niño</div>
            <div class="checkbox-group">
              <div class="checkbox-item">
                <input type="checkbox" id="cabezudo" value="cabezudo">
                <label for="cabezudo">Muy cabezudo</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="desobediente" value="desobediente">
                <label for="desobediente">Desobediente</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="nodormir" value="nodormir">
                <label for="nodormir">No quiere dormir</label>
              </div>
            </div>
          </div>

          <div class="option-group">
            <div class="option-label">Intensidad</div>
            <div class="checkbox-group">
              <div class="checkbox-item">
                <input type="radio" name="intensity" id="medio" value="medio" checked>
                <label for="medio">Medio (amable pero firme)</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="intensity" id="fuerte" value="fuerte">
                <label for="fuerte">Fuerte (más intimidante)</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="intensity" id="muy-fuerte" value="muy-fuerte">
                <label for="muy-fuerte">Muy fuerte (muy serio)</label>
              </div>
            </div>
          </div>

          <div class="config-btn-group">
            <button class="config-btn cancel" onclick="resetConfig()">Cancelar</button>
            <button class="config-btn confirm" onclick="startCall()">Llamar 📞</button>
          </div>
        </div>
      `;
      document.getElementById("app").classList.remove("call-screen", "ended-screen");
      document.getElementById("app").classList.add("config-screen");
    }

    window.speechSynthesis.getVoices();
    window.speechSynthesis.addEventListener("voiceschanged", () => {
      window.speechSynthesis.getVoices();
    });
  </script>
</body>
</html>
