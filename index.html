<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comisaría 1ª" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230f0f14' width='180' height='180'/><text x='90' y='110' font-size='100' text-anchor='middle' dominant-baseline='middle'>🚔</text></svg>" />
  <title>Comisaría 1ª Sección</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #0f0f14; color: #fff; overflow: hidden; }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(52,199,89,0), 0 0 0 16px rgba(52,199,89,0.22), 0 0 0 32px rgba(52,199,89,0.08); } 100% { box-shadow: 0 0 0 0 rgba(52,199,89,0), 0 0 0 16px rgba(52,199,89,0.22), 0 0 0 32px rgba(52,199,89,0.08); } }
    
    .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .idle-screen { background: radial-gradient(ellipse at 50% 20%, #182848 0%, #090c13 70%); justify-content: center; align-items: center; gap: 36px; padding: 40px 24px; }
    .call-screen { background: linear-gradient(170deg, #1c1c24 0%, #2a2a32 100%); justify-content: space-between; padding: 60px 24px 40px; align-items: center; }
    .ended-screen { background: #111; justify-content: center; align-items: center; gap: 12px; }
    
    .title-group { text-align: center; }
    .emoji-large { font-size: 80px; margin-bottom: 16px; }
    .title { color: #fff; font-size: 26px; font-weight: 300; margin: 0; letter-spacing: 0.5px; }
    .subtitle { color: #4a90e2; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
    
    .call-button { display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
    .button-circle { width: 68px; height: 68px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform 0.1s; }
    .call-button:active .button-circle { transform: scale(0.92); }
    .button-circle.green { background: #34c759; }
    .button-circle.red { background: #ff3b30; }
    .button-label { color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 0.3px; }
    
    .avatar { width: 132px; height: 132px; border-radius: 50%; background: linear-gradient(135deg, #1b3a6b 0%, #2660a8 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; box-shadow: 0 6px 32px rgba(0,0,0,0.5); transition: box-shadow 0.4s ease; }
    .avatar.speaking { animation: pulse-ring 1.5s infinite; }
    
    .helper-box { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 16px 24px; text-align: left; line-height: 2; }
    .helper-line { color: #888; font-size: 12px; margin: 0; }
    .helper-label { color: #aaa; }
    
    .reset-button { margin-top: 40px; color: #4a90e2; background: none; border: none; font-size: 14px; cursor: pointer; text-decoration: underline; font-family: inherit; }
    
    #startBtn { gap: 12px; padding: 18px 52px; background: #34c759; color: #fff; border: none; border-radius: 50px; font-size: 20px; font-weight: 600; box-shadow: 0 8px 32px rgba(52,199,89,0.4); letter-spacing: 0.3px; font-family: inherit; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app" class="screen idle-screen">
    <div class="title-group">
      <div class="emoji-large">🚔</div>
      <h1 class="title">Comisaría 1ª Sección</h1>
      <p class="subtitle">Línea de intervención</p>
    </div>
    <button id="startBtn">📞 Llamar</button>
    <div class="helper-box">
      <p class="helper-line"><span class="helper-label">🎙️ Silencio</span> → le habla directo a Mauricio</p>
      <p class="helper-line"><span class="helper-label">⌨️ Teclado</span> → manda el patrullero</p>
      <p class="helper-line"><span class="helper-label">🔊 Altavoz</span> → cierra bien (se portó bien)</p>
    </div>
  </div>

  <script>
    const LINES = {
      intro: "Buenas tardes, acá habla el oficial Rodríguez de la Comisaría Primera. Me reportaron que un niño llamado Mauricio no está portándose bien y solicitan intervención. ¿Confirma los datos?",
      pregunta: "Mauricio, te habla el oficial Rodríguez. Mirá, tenemos el patrullero listo para salir. Antes de mandar la unidad, quiero saber una cosa... ¿vas a portarte bien y obedecer a tus papás, sí o no?",
      patrullero: "Acá el oficial Rodríguez para Central... confirmen disponibilidad de unidad para buscar a menor en domicilio particular. Sí, el niño Mauricio. Afirmativo, estamos saliendo en cinco minutos.",
      bueno: "Ah, qué bien. Me alegra mucho escuchar eso. Mauricio, muy bien de tu parte. Voy a cancelar el patrullero y anotar acá que el caso quedó resuelto. Portate siempre así, ¿eh? Buenas noches a la familia. Hasta luego."
    };

    let phase = "idle";
    let secs = 0;
    let speaking = false;
    let timerInterval = null;
    let ringInterval = null;
    let audioCtx = null;

    function formatTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function playRing() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const beep = (t, dur, freq) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sine";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.35, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
          osc.start(t);
          osc.stop(t + dur + 0.01);
        };
        const doRing = () => {
          const now = audioCtx.currentTime;
          beep(now, 0.38, 490);
          beep(now + 0.48, 0.38, 490);
        };
        doRing();
        ringInterval = setInterval(doRing, 3200);
      } catch (_) {}
    }

    function stopRing() {
      clearInterval(ringInterval);
      try { audioCtx?.close(); } catch (_) {}
    }

    function speak(text, onEnd) {
      const synth = window.speechSynthesis;
      synth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = "es-ES";
      utt.pitch = 0.52;
      utt.rate = 0.87;
      utt.volume = 1;
      const voices = synth.getVoices();
      const male = voices.find(v => v.lang.startsWith("es") && /male|jorge|diego|miguel|pablo/i.test(v.name));
      if (male) utt.voice = male;
      else {
        const anySpanish = voices.find(v => v.lang.startsWith("es"));
        if (anySpanish) utt.voice = anySpanish;
      }
      utt.onstart = () => { speaking = true; updateAvatar(); };
      utt.onend = () => { speaking = false; updateAvatar(); onEnd?.(); };
      utt.onerror = () => { speaking = false; updateAvatar(); };
      synth.speak(utt);
    }

    function updateAvatar() {
      const avatar = document.querySelector(".avatar");
      if (avatar) {
        if (speaking) avatar.classList.add("speaking");
        else avatar.classList.remove("speaking");
      }
    }

    function renderIdle() {
      document.getElementById("app").innerHTML = `
        <div class="title-group">
          <div class="emoji-large">🚔</div>
          <h1 class="title">Comisaría 1ª Sección</h1>
          <p class="subtitle">Línea de intervención</p>
        </div>
        <button id="startBtn">📞 Llamar</button>
        <div class="helper-box">
          <p class="helper-line"><span class="helper-label">🎙️ Silencio</span> → le habla directo a Mauricio</p>
          <p class="helper-line"><span class="helper-label">⌨️ Teclado</span> → manda el patrullero</p>
          <p class="helper-line"><span class="helper-label">🔊 Altavoz</span> → cierra bien (se portó bien)</p>
        </div>
      `;
      document.getElementById("app").classList.remove("call-screen", "ended-screen");
      document.getElementById("app").classList.add("idle-screen");
      document.getElementById("startBtn").addEventListener("click", startCall);
    }

    function renderCall() {
      const isActive = phase === "active";
      const html = `
        <div style="text-align: center;">
          <p style="color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; margin: 0;">${isActive ? "En llamada" : "Llamando..."}</p>
          <h2 style="color: #fff; font-size: 34px; font-weight: 300; margin: 6px 0 4px;">Comisaría 1ª</h2>
          <p style="color: #888; font-size: 14px; margin: 0; min-height: 20px;">${isActive ? formatTime(secs) : "Conectando…"}</p>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 14px;">
          <div class="avatar">👮</div>
          ${speaking ? '<div style="display: flex; align-items: center; gap: 7px; color: #34c759; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;"><span style="display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #34c759; animation: blink 1.1s ease-in-out infinite;"></span>Oficial hablando</div>' : '<div style="height: 20px;"></div>'}
        </div>
        <div style="width: 100%; max-width: 300px;">
          ${isActive ? `
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px 16px; margin-bottom: 36px;">
              <button class="call-button" onclick="triggerLine('pregunta')"><div class="button-circle">🎙️</div><span class="button-label">Silencio</span></button>
              <button class="call-button" onclick="triggerLine('patrullero')"><div class="button-circle">⌨️</div><span class="button-label">Teclado</span></button>
              <button class="call-button" onclick="triggerLine('bueno')"><div class="button-circle">🔊</div><span class="button-label">Altavoz</span></button>
            </div>
            <div style="display: flex; justify-content: center;">
              <button class="call-button" onclick="hangUp()"><div class="button-circle red">📵</div></button>
            </div>
          ` : `
            <div style="display: flex; justify-content: center;">
              <button class="call-button" onclick="hangUp()"><div class="button-circle red">📵</div><span class="button-label">Rechazar</span></button>
            </div>
          `}
        </div>
      `;
      document.getElementById("app").innerHTML = html;
      document.getElementById("app").classList.remove("idle-screen", "ended-screen");
      document.getElementById("app").classList.add("call-screen");
    }

    function renderEnded() {
      document.getElementById("app").innerHTML = `
        <div class="ended-emoji" style="font-size: 64px;">📵</div>
        <p class="ended-title" style="color: #fff; font-size: 24px; font-weight: 300; margin: 0;">Llamada finalizada</p>
        <p class="ended-time" style="color: #666; font-size: 14px; margin: 0;">${formatTime(secs)}</p>
        <button class="reset-button" onclick="reset()">Volver al inicio</button>
      `;
      document.getElementById("app").classList.remove("idle-screen", "call-screen");
      document.getElementById("app").classList.add("ended-screen");
    }

    function startCall() {
      const unlock = new SpeechSynthesisUtterance(" ");
      unlock.volume = 0;
      window.speechSynthesis.speak(unlock);
      
      phase = "ringing";
      renderCall();
      playRing();
      setTimeout(() => {
        stopRing();
        phase = "active";
        renderCall();
        timerInterval = setInterval(() => {
          secs++;
          const timeEl = document.querySelector("[style*='min-height: 20px']");
          if (timeEl) timeEl.textContent = formatTime(secs);
        }, 1000);
        setTimeout(() => speak(LINES.intro), 800);
      }, 4200);
    }

    function triggerLine(key) {
      if (key === "bueno") {
        speak(LINES[key], () => {
          setTimeout(() => {
            clearInterval(timerInterval);
            phase = "ended";
            renderEnded();
          }, 600);
        });
      } else {
        speak(LINES[key]);
      }
    }

    function hangUp() {
      window.speechSynthesis.cancel();
      stopRing();
      clearInterval(timerInterval);
      speaking = false;
      phase = "ended";
      renderEnded();
    }

    function reset() {
      phase = "idle";
      secs = 0;
      speaking = false;
      renderIdle();
    }

    window.speechSynthesis.getVoices();
    window.speechSynthesis.addEventListener("voiceschanged", () => {
      window.speechSynthesis.getVoices();
    });

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startBtn").addEventListener("click", startCall);
    });
  </script>
</body>
</html>
